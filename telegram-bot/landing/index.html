<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obsidigram — Headless CMS for Telegram</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/@fontsource/cooper-hewitt@5.2.5/700.css" rel="stylesheet" crossorigin>
</head>
<body>
  <script>
    (function(){var t=localStorage.getItem('theme');var d=window.matchMedia('(prefers-color-scheme:dark)').matches;var r=t||(d?'dark':'light');document.documentElement.classList.toggle('dark',r==='dark')})();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>

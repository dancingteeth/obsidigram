services:
  obsidigram-bot:
    env_file:
      - ../.env
    build:
      context: ..
      dockerfile: telegram-bot/Dockerfile
    container_name: obsidigram-bot
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/app/data
    volumes:
      - /root/obsidigram/data:/app/data
      - /root/obsidigram/logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3


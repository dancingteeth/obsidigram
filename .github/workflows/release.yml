name: Release Plugin

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter obsidigram run build

      - name: Create release assets
        run: |
          mkdir -p release
          cp obsidian-plugin/main.js obsidian-plugin/manifest.json release/
          [ -f obsidian-plugin/styles.css ] && cp obsidian-plugin/styles.css release/
          cd release && zip -r ../obsidigram-${{ github.ref_name }}.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: obsidigram-${{ github.ref_name }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

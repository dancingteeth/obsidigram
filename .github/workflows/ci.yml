name: CI

on:
  push:
    branches: [master]
    paths:
      - 'telegram-bot/**'
      - 'obsidian-plugin/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'
  pull_request:
    branches: [master]
    paths:
      - 'telegram-bot/**'
      - 'obsidian-plugin/**'
      - 'scripts/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Landing publication URL (Vite)
        run: |
          set -euo pipefail
          rm -f telegram-bot/landing/.env.production
          URL="${{ vars.VITE_PUBLICATION_WEBSITE_URL }}"
          if [ -n "${URL}" ]; then
            printf 'VITE_PUBLICATION_WEBSITE_URL=%s\n' "${URL}" > telegram-bot/landing/.env.production
          fi

      - name: Build plugin
        run: pnpm --filter obsidigram run build

      - name: Build plugin archive
        run: pnpm run plugin-archive

      - name: Build landing
        run: pnpm --filter obsidigram-landing run build

      - name: Build bot
        run: pnpm --filter obsidigram-bot run build

  # Health check runs in Deploy workflow via SSH (public URL may be unreachable from GitHub runners)

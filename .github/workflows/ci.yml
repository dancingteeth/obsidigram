name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin
        run: pnpm --filter obsidigram run build

      - name: Build plugin archive
        run: pnpm run plugin-archive

      - name: Build landing
        run: pnpm --filter obsidigram-landing run build

      - name: Build bot
        run: pnpm --filter obsidigram-bot run build

  # Health check runs in Deploy workflow via SSH (public URL may be unreachable from GitHub runners)
